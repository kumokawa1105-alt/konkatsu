    margin-bottom: 20px;

  }
  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b9d, #d6336c);
    width: 0%;
    transition: width 0.4s ease;
  }
  .screen {
    background: #fff;

    display: none;

  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome h2 {
    color: #d6336c;
    text-align: center;

  }

    display: inline-block;
    padding: 6px 16px;

    font-size: 0.85em;
    font-weight: bold;
    margin-bottom: 16px;
    align-self: center;
  }
  .q-number { text-align: center; color: #999; font-size: 0.85em; margin-bottom: 4px; }
  .q-text {
    font-size: 1.25em;
    font-weight: bold;
    color: #333;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    padding: 16px 18px;
    background: #fff5f8;
    border: 2px solid #ffe0ec;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 1em;
    text-align: center;
  }
  .choice:active {
    background: #ffb6c1;
    border-color: #d6336c;
    color: #fff;
    transform: scale(0.98);
  }

    background: linear-gradient(135deg, #ff6b9d, #d6336c);
    border-color: #d6336c;
    color: #fff;
    font-weight: bold;

    background: linear-gradient(135deg, #ff6b9d, #d6336c);
    color: #fff;
    border: none;
    padding: 16px 32px;
    font-size: 1.1em;
    font-weight: bold;

    margin-top: 16px;

  .btn.secondary {

  .ai-comment {

    border-radius: 12px;
    font-style: italic;
    color: #555;

  .action-list {

// 深掘り質問
const FOLLOWUP_QUESTIONS = [
  "今日この場に来た決め手って何でしたか？",
  "もし明日休みだったら何したいですか？",
  "最近一番笑ったことって何ですか？",
  "好きな食べ物の話で30秒ください！",
  "子供の頃の夢って覚えてますか？"
];

let state = {
  nameA: "",
  nameB: "",
  answers: { A: {}, B: {} },
  currentQ: 0,    // 0..4
  currentP: "A",  // A or B
  step: 0         // 0..9 (Q順)
};

const screens = {
  welcome: document.getElementById("screen-welcome"),
  turn: document.getElementById("screen-turn"),
  question: document.getElementById("screen-question"),
  result: document.getElementById("screen-result")
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove("active"));
  screens[name].classList.add("active");
}

function updateProgress() {
  const total = QUESTIONS.length * 2;
  const pct = (state.step / total) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
}

function showTurn() {
  const personName = state.currentP === "A" ? state.nameA : state.nameB;
  const nextPersonName = state.currentP === "A" ? state.nameA : state.nameB;
  document.getElementById("turnName").textContent = nextPersonName + "さんの番！";
  const isFirst = state.step === 0;
  document.getElementById("turnSub").textContent = isFirst
    ? "全5問、サクッと答えてね"
    : "スマホを渡して、次の質問に答えてね";
  showScreen("turn");
}

function showQuestion() {
  const q = QUESTIONS[state.currentQ];
  const personName = state.currentP === "A" ? state.nameA : state.nameB;
  document.getElementById("qBadge").textContent = personName + "さんの番";
  document.getElementById("qNumber").textContent = `Q${state.currentQ + 1} / 5`;
  document.getElementById("qText").textContent = q.question;
  const choicesEl = document.getElementById("qChoices");
  choicesEl.innerHTML = q.choices.map((c, i) =>
    `<div class="choice" data-idx="${i}">${c}</div>`
  ).join("");
  choicesEl.querySelectorAll(".choice").forEach(el => {
    el.addEventListener("click", () => {
      el.classList.add("selected");
      const idx = parseInt(el.dataset.idx);
      state.answers[state.currentP][q.id] = idx;
      setTimeout(advance, 280);
    });
  });
  showScreen("question");
  updateProgress();
}

function advance() {
  state.step++;
  // 交互: A→B→A→B... の順で、両方答えたら次のQへ
  if (state.currentP === "A") {
    state.currentP = "B";
    showTurn();
  } else {
    state.currentP = "A";
    state.currentQ++;
    if (state.currentQ >= QUESTIONS.length) {
      updateProgress();
      showResult();
    } else {
      showTurn();
    }
  }
}

function calcType(answers) {
  const scores = { "安心": 0, "ドキドキ": 0, "成長": 0, "自由": 0, "癒し": 0 };
  for (const qid in answers) {
    const [type, weight] = TYPE_MAP[qid][answers[qid]];
    scores[type] += weight;
  }
  let topType = "安心", topScore = -1;
  for (const t in scores) {
    if (scores[t] > topScore) { topScore = scores[t]; topType = t; }
  }
  return topType;
}

function getMatrix(map, typeA, typeB, fallback) {
  return map[`${typeA}-${typeB}`] || map[`${typeB}-${typeA}`] || fallback;
}

function getTopics(typeA, typeB) {
  const pool = [...new Set([...TOPIC_BANK[typeA], ...TOPIC_BANK[typeB]])];
  return pool.sort(() => Math.random() - 0.5).slice(0, 3);
}

function getOpeners(typeA, typeB, nameA, nameB) {
  const lines = OPENERS_BY_TYPE_PAIR[`${typeA}-${typeB}`] || OPENERS_BY_TYPE_PAIR[`${typeB}-${typeA}`] || [
    `${nameB}さんの好きなことを聞いてみてください`,
    "「次の休みの予定は？」から広げると盛り上がります"
  ];
  return [
    { who: nameA, line: lines[0].replace(/○○/g, nameB) },
    { who: nameB, line: lines[1].replace(/○○/g, nameA) }
  ];
}

function getFollowups() {
  return [...FOLLOWUP_QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 3);
}

function showResult() {
  const typeA = calcType(state.answers.A);
  const typeB = calcType(state.answers.B);
  const compat = getMatrix(COMPAT_MATRIX, typeA, typeB, 75);
  const relationship = getMatrix(RELATIONSHIPS, typeA, typeB, "違いも個性も楽しめる、可能性たっぷりの2人！");
  const dateIdea = getMatrix(DATE_IDEAS, typeA, typeB, "まずは話題のカフェでお茶からスタートしてみて♪");
  const topics = getTopics(typeA, typeB);
  const openers = getOpeners(typeA, typeB, state.nameA, state.nameB);
  const followups = getFollowups();
  const bonusTip = getMatrix(PAIR_BONUS_TIPS, typeA, typeB, "「もし2人で1日デートするなら何したい？」を出し合うだけで盛り上がります。");
  const comment = AI_COMMENTS[Math.floor(Math.random() * AI_COMMENTS.length)];

  document.getElementById("resultBody").innerHTML = `
    <div class="types-row">
      <div class="type-card">
        <div class="label">${state.nameA}さん</div>
        <div class="type">${TYPE_LABELS[typeA]}</div>
      </div>
      <div class="type-card">
        <div class="label">${state.nameB}さん</div>
        <div class="type">${TYPE_LABELS[typeB]}</div>
      </div>
    </div>

    <div class="result-section">
      <h3>💖 2人の相性</h3>
      <div class="compat-circle"><div class="compat-percent">${compat}%</div></div>
    </div>

    <div class="result-section">
      <h3>🌹 距離がグッと縮まる！今すぐできるアクション</h3>
      <div class="action-list">
        ${UNIVERSAL_ACTIONS.map((a, i) => `
          <div class="action-item">
            <div class="action-num">${i+1}</div>
            <div class="action-body">
              <b>${a.title}</b>
              <span class="desc">${a.desc}</span>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="opener-card" style="margin-top:14px;">
        <div class="opener-label">▶ この2人ならではの裏技</div>
        <div style="font-size:0.95em; line-height:1.7; color:#333;">✨ ${bonusTip}</div>
      </div>
    </div>

    <div class="result-section">
      <h3>🌸 2人の関係性</h3>
      <p>${relationship}</p>
    </div>

    <div class="result-section">
      <h3>💫 ${state.nameA}さんの特徴</h3>
      <p>${TYPE_FEATURES[typeA]}</p>
    </div>

    <div class="result-section">
      <h3>💫 ${state.nameB}さんの特徴</h3>
      <p>${TYPE_FEATURES[typeB]}</p>
    </div>

    <div class="result-section">
      <h3>🎤 まずはこの一言！</h3>
      <div class="opener-card">
        <div class="opener-label">▶ ${openers[0].who}さん から</div>
        <div class="opener-line">${openers[0].line}</div>
      </div>
      <div class="opener-card">
        <div class="opener-label">▶ ${openers[1].who}さん から</div>
        <div class="opener-line">${openers[1].line}</div>
      </div>
    </div>

    <div class="result-section">
      <h3>🌟 盛り上がる話題</h3>
      <ul>
        ${topics.map(t => `<li>${t}</li>`).join("")}
      </ul>
    </div>

    <div class="result-section">
      <h3>❓ 深掘り質問</h3>
      <ul>
        ${followups.map(f => `<li>${f}</li>`).join("")}
      </ul>
    </div>

    <div class="result-section">
      <h3>🍽 おすすめ初デート</h3>
      <p>${dateIdea}</p>
    </div>

    <div class="result-section">
      <h3>🤖 AIから一言</h3>
      <div class="ai-comment">${comment}</div>
    </div>
  `;
  showScreen("result");
}

document.getElementById("startBtn").addEventListener("click", () => {
  const nA = document.getElementById("nameA").value.trim();
  const nB = document.getElementById("nameB").value.trim();
  if (!nA || !nB) {
    alert("両方のお名前を入れてね💦");
    return;
  }
  state.nameA = nA;
  state.nameB = nB;
  state.currentP = "A";
  state.currentQ = 0;
  state.step = 0;
  state.answers = { A: {}, B: {} };
  showTurn();
});

document.getElementById("turnNextBtn").addEventListener("click", showQuestion);

document.getElementById("restartBtn").addEventListener("click", () => {
  document.getElementById("nameA").value = state.nameA;
  document.getElementById("nameB").value = state.nameB;
  showScreen("welcome");
  document.getElementById("progressFill").style.width = "0%";
});
</script>
</body>
</html>
